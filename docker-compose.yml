name: payment-gateway

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.next
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: payment-gateway-postgres
    # WARNING: Configure database credentials via environment variables before production use.
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payment-gateway}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
